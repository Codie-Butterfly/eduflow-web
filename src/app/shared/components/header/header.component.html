<mat-toolbar class="header">
  <button mat-icon-button (click)="onToggleSidebar()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/" class="brand-link">
    <img src="assets/images/logo.png" alt="EduFlow" class="brand-logo">
  </a>

  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="notificationMenu" class="notification-btn" (click)="loadNotifications()">
    @if (unreadCount() > 0) {
      <mat-icon [matBadge]="unreadCount()" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
    } @else {
      <mat-icon>notifications_none</mat-icon>
    }
  </button>

  <mat-menu #notificationMenu="matMenu" class="notification-menu">
    <div class="notification-header" (click)="$event.stopPropagation()">
      <span>Notifications</span>
      @if (unreadCount() > 0) {
        <button mat-button color="primary" (click)="markAllAsRead()">Mark all read</button>
      }
    </div>
    <mat-divider></mat-divider>
    @if (notifications().length === 0) {
      <div class="no-notifications" (click)="$event.stopPropagation()">
        <mat-icon>notifications_off</mat-icon>
        <span>No notifications</span>
      </div>
    } @else {
      @for (notification of notifications().slice(0, 5); track notification.id) {
        <button mat-menu-item [class.unread]="!notification.read" (click)="markAsRead(notification)">
          <mat-icon>{{ getNotificationIcon(notification.type) }}</mat-icon>
          <div class="notification-content">
            <span class="notification-title">{{ notification.title }}</span>
            <span class="notification-message">{{ notification.message }}</span>
            <span class="notification-time">{{ notification.createdAt | date:'short' }}</span>
          </div>
        </button>
      }
    }
    <mat-divider></mat-divider>
    <a mat-menu-item class="view-all" routerLink="announcements">
      <span>View all notifications</span>
    </a>
  </mat-menu>

  <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
    <div class="user-avatar">
      <mat-icon>person</mat-icon>
    </div>
    <span class="user-name">{{ currentUser()?.fullName }}</span>
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item>
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>
    <button mat-menu-item>
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
